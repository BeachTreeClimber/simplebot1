name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name SimpleBot --icon icon.ico --add-data "knowledge_seed.json;." simplebot_gui.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleBot-windows
          path: dist/SimpleBot.exe
